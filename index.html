<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서하 | 진로취업 전문 컨설턴트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { overflow-x: hidden; background: var(--cream); }

    /* ── 네비게이션 ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 3rem;
      background: var(--cream);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--dark);
      text-decoration: none;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2.8rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--dark);
      text-decoration: none;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 2px;
      transition: opacity 0.25s;
    }

    /* 밑줄 애니메이션 */
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .nav-links a:hover { opacity: 0.6; }
    .nav-links a:hover::after { width: 100%; }

    /* ── 페이지 래퍼 ── */
    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 5.5rem 3rem 0;
    }

    /* ── 그리드 컨테이너 (여백으로 축소) ── */
    .grid-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 0 2rem;
    }

    /* ── 메인 이미지 그리드 ── */
    .hero-grid {
      display: grid;
      grid-template-columns: 38% 31% 31%;
      grid-template-rows: 38vh 28vh;
      gap: 10px;
      width: 100%;
      max-width: 1100px;
    }

    /* 각 그리드 셀 */
    .grid-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--cream-dark);
      border-radius: 2px;
    }

    /* 사진 */
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .grid-item:hover img { transform: scale(1.05); }

    /* placeholder */
    .placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.8rem;
      background: var(--cream-dark);
    }

    .placeholder-icon { font-size: 2rem; opacity: 0.18; }
    .placeholder-text {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--light);
      text-transform: uppercase;
    }

    /* ── 호버 오버레이 ── */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background: rgba(18, 16, 14, 0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.45s ease;
    }

    /* 호버 텍스트 — 처음부터 보이게, 호버 시 강조 */
    .overlay-kr {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(244, 240, 232, 0);
      line-height: 1;
      transition: color 0.35s ease, transform 0.35s ease;
      transform: translateY(10px);
    }

    .overlay-en {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      color: rgba(244, 240, 232, 0);
      text-transform: uppercase;
      transition: color 0.35s ease 0.05s, transform 0.35s ease 0.05s;
      transform: translateY(10px);
    }

    .overlay-bar {
      width: 0;
      height: 1px;
      background: rgba(244, 240, 232, 0.7);
      transition: width 0.35s ease 0.08s;
      margin-bottom: 0.2rem;
    }

    /* 호버 활성화 */
    .grid-item:hover .grid-overlay { background: rgba(18, 16, 14, 0.52); }
    .grid-item:hover .placeholder   { filter: brightness(0.72); }
    .grid-item:hover .overlay-kr    { color: #F5F0E8; transform: translateY(0); }
    .grid-item:hover .overlay-en    { color: rgba(244, 240, 232, 0.7); transform: translateY(0); }
    .grid-item:hover .overlay-bar   { width: 36px; }

    /* 왼쪽 셀 세로 전체 */
    .grid-item.tall { grid-row: span 2; }

    /* ── 하단 영역 ── */
    .bottom-bar {
      padding: 1.4rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--line);
    }

    .tagline-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.92rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--light);
    }

    .tagline-text strong {
      font-weight: 500;
      color: var(--dark);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 1rem;
    }

    .footer-right {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--light);
      text-transform: uppercase;
    }

    /* ── 모바일 ── */
    @media (max-width: 768px) {
      .nav { padding: 1.2rem 1.5rem; }
      .nav-links { display: none; }
      .page-wrap { padding: 4.5rem 1rem 0; }
      .grid-wrap { padding: 1rem 0 1.5rem; }
      .hero-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 38vw 38vw 38vw;
        gap: 8px;
      }
      .grid-item.tall { grid-row: span 1; }
      .overlay-kr { font-size: 1.3rem; }
      .bottom-bar { padding: 1.2rem 1.5rem; }
      .footer-right { display: none; }
    }
  </style>
</head>
<body>

  <!-- 네비게이션 -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">서하</a>
    <ul class="nav-links">
      <li><a href="pages/about.html">소개</a></li>
      <li><a href="pages/consulting.html">컨설팅</a></li>
      <li><a href="pages/lecture.html">강의</a></li>
      <li><a href="pages/contact.html">문의</a></li>
    </ul>
  </nav>

  <div class="page-wrap">
    <div class="grid-wrap">
      <main class="hero-grid">

        <!-- ① 소개 — 왼쪽 세로 전체 -->
        <a href="pages/about.html" class="grid-item tall">
          <!-- <img src="assets/images/about.jpg" alt="강사 소개"> -->
          <div class="placeholder">
            <span class="placeholder-icon">📷</span>
            <span class="placeholder-text">대표 사진</span>
          </div>
          <div class="grid-overlay">
            <div class="overlay-bar"></div>
            <span class="overlay-kr">소개</span>
            <span class="overlay-en">About</span>
          </div>
        </a>

        <!-- ② 컨설팅 — 오른쪽 상단 왼쪽 -->
        <a href="pages/consulting.html" class="grid-item">
          <!-- <img src="assets/images/consulting.jpg" alt="취업 컨설팅"> -->
          <div class="placeholder">
            <span class="placeholder-icon">📷</span>
            <span class="placeholder-text">컨설팅 사진</span>
          </div>
          <div class="grid-overlay">
            <div class="overlay-bar"></div>
            <span class="overlay-kr">컨설팅</span>
            <span class="overlay-en">Consulting</span>
          </div>
        </a>

        <!-- ③ 강의 — 오른쪽 상단 오른쪽 -->
        <a href="pages/lecture.html" class="grid-item">
          <!-- <img src="assets/images/lecture.jpg" alt="강의"> -->
          <div class="placeholder">
            <span class="placeholder-icon">📷</span>
            <span class="placeholder-text">강의 현장 사진</span>
          </div>
          <div class="grid-overlay">
            <div class="overlay-bar"></div>
            <span class="overlay-kr">강의</span>
            <span class="overlay-en">Lecture</span>
          </div>
        </a>

        <!-- ④ 문의 — 오른쪽 하단 왼쪽 -->
        <a href="pages/contact.html" class="grid-item">
          <!-- <img src="assets/images/contact.jpg" alt="문의"> -->
          <div class="placeholder">
            <span class="placeholder-icon">📷</span>
            <span class="placeholder-text">분위기 사진</span>
          </div>
          <div class="grid-overlay">
            <div class="overlay-bar"></div>
            <span class="overlay-kr">문의</span>
            <span class="overlay-en">Contact</span>
          </div>
        </a>

        <!-- ⑤ 추가 이미지 — 오른쪽 하단 오른쪽 -->
        <div class="grid-item">
          <!-- <img src="assets/images/gallery.jpg" alt="현장"> -->
          <div class="placeholder">
            <span class="placeholder-icon">📷</span>
            <span class="placeholder-text">현장 사진</span>
          </div>
        </div>

      </main>
    </div>

    <!-- 하단 바 -->
    <footer class="bottom-bar">
      <p class="tagline-text">
        The Language of Career &nbsp;by&nbsp; <strong>서하</strong>
      </p>
      <span class="footer-right">진로취업 전문 컨설턴트</span>
    </footer>
  </div>

  <script src="assets/main.js"></script>
</body>
</html>
