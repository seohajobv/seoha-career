<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의 | 서하 진로취업 컨설턴트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: calc(100vh - 6rem);
    }

    .contact-left {
      padding: 6rem 4rem;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-left p {
      font-size: 0.9rem;
      line-height: 2;
      color: var(--mid);
      margin-bottom: 2.5rem;
    }

    .info-list { display: flex; flex-direction: column; gap: 0; }

    .info-row {
      display: flex;
      gap: 2rem;
      align-items: baseline;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--line);
    }

    .info-row:first-child { border-top: 1px solid var(--line); }

    .info-key {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--light);
      text-transform: uppercase;
      min-width: 64px;
    }

    .info-val {
      font-size: 0.88rem;
      color: var(--mid);
    }

    /* 폼 영역 */
    .contact-right {
      padding: 6rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-right h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 2.5rem;
      color: var(--dark);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.4rem;
    }

    .form-group label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--light);
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 0.7rem 0;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--dark);
      outline: none;
      transition: border-color 0.3s;
      -webkit-appearance: none;
      border-radius: 0;
      width: 100%;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-bottom-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .submit-btn {
      margin-top: 1.5rem;
      padding: 1rem 2.5rem;
      background: var(--dark);
      color: var(--cream);
      border: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: background 0.3s;
      text-transform: uppercase;
      align-self: flex-start;
    }

    .submit-btn:hover { background: var(--accent); }

    .success-msg {
      display: none;
      padding: 1rem 1.5rem;
      background: var(--cream-dark);
      border-left: 2px solid var(--accent);
      font-size: 0.85rem;
      color: var(--mid);
      margin-top: 1rem;
    }

    @media (max-width: 768px) {
      .contact-wrap { grid-template-columns: 1fr; }
      .contact-left { padding: 4rem 1.5rem 3rem; border-right: none; border-bottom: 1px solid var(--line); }
      .contact-right { padding: 3rem 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="page-nav">
    <a href="../index.html" class="nav-logo">서하</a>
    <ul class="nav-links">
      <li><a href="about.html">소개</a></li>
      <li><a href="consulting.html">컨설팅</a></li>
      <li><a href="lecture.html">강의</a></li>
      <li><a href="contact.html" class="active">문의</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    <div class="contact-wrap">

      <!-- 왼쪽: 안내 -->
      <div class="contact-left">
        <span class="section-label">Contact</span>
        <h1 class="section-title">
          함께 시작할<br><em>준비</em>가 되셨나요
        </h1>
        <div class="divider"></div>
        <p>
          진로 고민, 취업 준비, 강의 섭외 등<br>
          어떤 문의든 편하게 연락해 주세요.<br>
          48시간 이내 꼭 답변 드립니다.
        </p>

        <div class="info-list">
          <div class="info-row">
            <span class="info-key">Email</span>
            <span class="info-val">seoha.job@gmail.com</span>
          </div>
          <div class="info-row">
            <span class="info-key">Phone</span>
            <span class="info-val">010-0000-0000</span>
          </div>
          <div class="info-row">
            <span class="info-key">Kakao</span>
            <span class="info-val">카카오 오픈채팅 링크 입력</span>
          </div>
          <div class="info-row">
            <span class="info-key">SNS</span>
            <span class="info-val">@인스타그램 아이디</span>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 폼 -->
      <div class="contact-right">
        <h2>문의 남기기</h2>

        <form id="contact-form" onsubmit="submitForm(event)">
          <div class="form-row">
            <div class="form-group">
              <label>이름</label>
              <input type="text" placeholder="홍길동" required>
            </div>
            <div class="form-group">
              <label>연락처</label>
              <input type="tel" placeholder="010-0000-0000" required>
            </div>
          </div>

          <div class="form-group">
            <label>이메일</label>
            <input type="email" placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label>문의 유형</label>
            <select required>
              <option value="" disabled selected>선택해 주세요</option>
              <option>1:1 진로 상담</option>
              <option>취업 컨설팅 (서류)</option>
              <option>취업 컨설팅 (면접)</option>
              <option>기관 특강 섭외</option>
              <option>기업 HRD 교육</option>
              <option>기타 문의</option>
            </select>
          </div>

          <div class="form-group">
            <label>문의 내용</label>
            <textarea placeholder="현재 상황과 궁금한 점을 자유롭게 적어주세요." rows="4"></textarea>
          </div>

          <button type="submit" class="submit-btn">문의 보내기</button>
        </form>

        <div class="success-msg" id="success-msg">
          ✓ 문의가 접수되었습니다. 48시간 이내 답변 드리겠습니다.
        </div>
      </div>

    </div>
  </div>

  <footer class="page-footer">
    <span class="footer-logo">서하</span>
    <span class="footer-copy">© 2025 서하 진로취업컨설팅</span>
  </footer>

  <script src="../assets/main.js"></script>
  <script>
    function submitForm(e) {
      e.preventDefault();
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    }
  </script>
</body>
</html>
